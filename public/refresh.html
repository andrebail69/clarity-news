<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clarity — Refresh</title>
<style>
  body { background: #101114; color: #ECECEC; font-family: 'JetBrains Mono', monospace; padding: 40px; max-width: 520px; margin: 0 auto; }
  h2 { color: #C8AA78; font-size: 18px; margin-bottom: 32px; }
  .item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1A1D22; font-size: 13px; }
  .status { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; background: #1A1D22; }
  .status.running { border: 2px solid #C8AA78; border-top-color: transparent; animation: spin 0.8s linear infinite; }
  .status.done { background: #22c55e; }
  .status.error { background: #EF4444; }
  .label { flex: 1; color: #9CA3AF; }
  .label.active { color: #ECECEC; }
  .msg { font-size: 11px; color: #4B5060; }
  button { background: rgba(200,170,120,0.12); color: #C8AA78; border: none; border-radius: 6px; padding: 12px 24px; font-size: 13px; font-family: inherit; cursor: pointer; margin-top: 32px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h2>Clarity — Manual Refresh</h2>

<div id="items"></div>
<button id="btn" onclick="runRefresh()">↻ Run Full Refresh</button>

<script>
const BASE = 'https://clarity-news-delta.vercel.app';
const KEY = 'clarity2026';
const CATS = ['breaking', 'world', 'business', 'energy', 'tech'];

function render(states) {
  document.getElementById('items').innerHTML = CATS.map((cat, i) => {
    const s = states[i];
    return `<div class="item">
      <div class="status ${s.status}"></div>
      <div class="label ${s.status === 'running' ? 'active' : ''}">${cat}</div>
      <div class="msg">${s.msg}</div>
    </div>`;
  }).join('');
}

async function runRefresh() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  const states = CATS.map(() => ({ status: '', msg: '' }));
  render(states);

  for (let i = 0; i < CATS.length; i++) {
    states[i] = { status: 'running', msg: 'fetching...' };
    render(states);
    const start = Date.now();
    try {
      const r = await fetch(`${BASE}/api/cron?cat=${CATS[i]}&key=${KEY}`);
      const data = await r.json();
      const secs = ((Date.now() - start) / 1000).toFixed(0);
      if (data.error) {
        states[i] = { status: 'error', msg: data.error };
      } else {
        states[i] = { status: 'done', msg: `${data.stories} stories · ${secs}s` };
      }
    } catch (e) {
      states[i] = { status: 'error', msg: e.message };
    }
    render(states);
  }

  btn.disabled = false;
}
</script>
</body>
</html>
